<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MEI DRIVE AFRICA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a192f 0%, #0d2137 50%, #0a192f 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        :root { --primary: #00ff88; --border: rgba(0,255,136,0.25); --card-bg: #0d2137; }
        .login-container { width: 100%; max-width: 420px; margin: 2rem; }
        .login-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 2.5rem; text-align: center; }
        .logo-icon { width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary), #00cc66); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; color: #0a192f; margin: 0 auto 1rem; }
        h1 { color: var(--primary); margin-bottom: 0.5rem; font-size: 1.8rem; }
        p { color: #a0b3d9; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 14px 16px; margin: 10px 0; background: #0f1a2c; border: 1px solid var(--border); border-radius: 14px; color: white; font-size: 1rem; }
        input:focus { outline: none; border-color: var(--primary); }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), #00cc66); border: none; border-radius: 14px; color: #0a192f; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,255,136,0.3); }
        .error { color: #ff4757; margin-top: 10px; font-size: 0.8rem; }
        a { color: var(--primary); text-decoration: none; display: block; margin-top: 1rem; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--card-bg); border-left: 4px solid var(--primary); padding: 12px 20px; border-radius: 12px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="logo-icon">M</div>
        <h1>Admin Portal</h1>
        <p>Sign in to manage courses and users</p>
        <input type="email" id="adminEmail" placeholder="Email" value="admin@meidriveafrica.com">
        <input type="password" id="adminPassword" placeholder="Password">
        <button id="loginBtn" onclick="adminLogin()">Login</button>
        <div id="errorMsg" class="error"></div>
        <a href="index.html">← Back to Site</a>
    </div>
</div>
<div id="toast-container"></div>

<script>
    const SUPABASE_URL = 'https://qpqkmmkrzxlhcpccefjn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwcWttbWtyenhsaGNwY2NlZmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjU0NzIsImV4cCI6MjA5NTEwMTQ3Mn0.Vw1hexN3NKoF_y9VFBFs_NUhJgFNNMwuyzDjImUcM6s';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    function showToast(msg) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `❌ ${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
    
    async function adminLogin() {
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;
        const btn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.textContent = '';
        btn.disabled = true;
        btn.textContent = 'Logging in...';
        
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { errorDiv.textContent = error.message; showToast(error.message); btn.disabled = false; btn.textContent = 'Login'; return; }
        
        const { data: profile } = await supabase.from('user_profiles').select('is_admin').eq('id', data.user.id).maybeSingle();
        if (!profile?.is_admin && email !== 'admin@meidriveafrica.com') {
            await supabase.auth.signOut();
            errorDiv.textContent = 'Access denied: Admin privileges required';
            showToast('Admin privileges required');
            btn.disabled = false;
            btn.textContent = 'Login';
            return;
        }
        
        window.location.href = 'admin-dashboard.html';
    }
</script>
</body>
</html>
